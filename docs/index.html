<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mail Status</title>
<style>
  :root {
    --bg: #f7f7f8;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b70;
    --border: #e4e4e7;
    --accent: #2f6fed;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #eaeaef;
      --muted: #9a9aa4;
      --border: #2a2d36;
      --accent: #6d9bff;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    padding: 24px 16px 64px;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }
  h1 { margin: 0 0 6px; font-size: 1.7rem; }
  .subtitle { color: var(--muted); margin-bottom: 20px; }
  .panel, .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .panel { padding: 16px; margin-bottom: 20px; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .button-link {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
  }
  .button-link.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .value {
    font-size: 2rem;
    font-weight: 700;
    margin-top: 6px;
  }
  .controls { margin-bottom: 12px; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
  }
  .table-wrap { overflow: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 640px; }
  th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  th {
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.03em;
  }
  tr:last-child td { border-bottom: none; }
  .empty { padding: 24px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Mail Status</h1>
  <div class="subtitle" id="subtitle">Loading...</div>

  <div class="panel">
    <div class="actions">
      <a class="button-link primary" href="https://github.com/RishitTandon7/cold-mail-sender/actions/workflows/send-emails.yml" target="_blank" rel="noopener">Run workflow</a>
      <a class="button-link" href="https://github.com/RishitTandon7/cold-mail-sender/settings/variables/actions" target="_blank" rel="noopener">Edit DRY_RUN</a>
    </div>
  </div>

  <div class="summary" id="summary"></div>

  <div class="controls">
    <input type="text" id="search" placeholder="Filter sent emails by name, company, title, or email">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Title</th>
          <th>Company</th>
          <th>Email</th>
          <th>Sent (UTC)</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="empty" id="empty-state" style="display:none;">No sent emails yet.</div>
  </div>
</div>

<script>
const DATA_STATS = "./data/stats.json";
const DATA_LOG = "./data/sent_log.json";
let rows = [];

function fmtDate(iso) {
  if (!iso) return "-";
  try {
    return new Date(iso).toISOString().replace("T", " ").slice(0, 16);
  } catch {
    return iso;
  }
}

function card(label, value, note = "") {
  return `
    <div class="card">
      <div class="label">${label}</div>
      <div class="value">${value}</div>
      ${note ? `<div style="margin-top:6px;color:var(--muted);font-size:0.85rem;">${note}</div>` : ""}
    </div>
  `;
}

function renderTable() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const filtered = rows.filter((row) =>
    !q || [row.name, row.title, row.company, row.email].some((value) =>
      (value || "").toLowerCase().includes(q)
    )
  );

  const tbody = document.getElementById("table-body");
  const empty = document.getElementById("empty-state");

  if (filtered.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";
  tbody.innerHTML = filtered
    .sort((a, b) => String(b.sent_at || "").localeCompare(String(a.sent_at || "")))
    .map((row) => `
      <tr>
        <td>${row.name || ""}</td>
        <td>${row.title || ""}</td>
        <td>${row.company || ""}</td>
        <td>${row.email || ""}</td>
        <td>${fmtDate(row.sent_at)}</td>
      </tr>
    `)
    .join("");
}

async function load() {
  try {
    const [statsRes, logRes] = await Promise.all([
      fetch(DATA_STATS + "?t=" + Date.now()),
      fetch(DATA_LOG + "?t=" + Date.now()),
    ]);
    const stats = statsRes.ok ? await statsRes.json() : null;
    const log = logRes.ok ? await logRes.json() : {};

    rows = Object.values(log || {});

    if (stats) {
      document.getElementById("subtitle").textContent =
        `Last updated ${fmtDate(stats.generated_at)} UTC`;
      document.getElementById("summary").innerHTML = [
        card("Sent so far", stats.total_sent),
        card("Sent today", stats.sent_today),
        card("Remaining", stats.remaining),
        card("Each batch", stats.batch_size, `${stats.runs_per_day} runs/day`),
      ].join("");
    } else {
      document.getElementById("subtitle").textContent = "No run data yet.";
      document.getElementById("summary").innerHTML = "";
    }

    renderTable();
  } catch (error) {
    document.getElementById("subtitle").textContent = "Could not load data.";
    document.getElementById("summary").innerHTML = "";
    document.getElementById("table-body").innerHTML = "";
    document.getElementById("empty-state").style.display = "block";
    document.getElementById("empty-state").textContent = "Error loading data: " + error.message;
  }
}

document.getElementById("search").addEventListener("input", renderTable);
load();
</script>
</body>
</html>
